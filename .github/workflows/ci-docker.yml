name: ci-docker

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  docker-cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        suite:
          - docker_cluster_baseline
          - docker_cluster_failure
          - docker_cluster_adversarial
          - docker_cluster_scale
          - docker_client_examples
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cached Orion test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: testing/docker/orion-node.Dockerfile
          load: true
          tags: orion-node-test:ci
          cache-from: type=gha,scope=orion-node-test
          cache-to: type=gha,mode=max,scope=orion-node-test

      - name: Run Docker suite
        env:
          ORION_SKIP_DOCKER_BUILD: "1"
          ORION_TEST_IMAGE: orion-node-test:ci
          RUST_TEST_THREADS: "1"
        run: cargo test -p orion-node --test ${{ matrix.suite }} -- --ignored --nocapture

